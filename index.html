<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 · Marce vs Roberto</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --gold:#F5C842; --marce:#E91E63; --roberto:#2563EB;
  --bg:#070B14; --surface:#111827; --surface2:#161E30;
  --border:rgba(245,200,66,0.15); --text:#F0F4FF; --muted:#8896B0;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* HERO */
.hero{position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(26,58,110,.8) 0%,transparent 70%),radial-gradient(ellipse 50% 35% at 50% -5%,rgba(245,200,66,.12) 0%,transparent 60%),linear-gradient(180deg,#020408 0%,#070B14 50%,#0D1528 100%);will-change:transform}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(245,200,66,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(245,200,66,.04) 1px,transparent 1px);background-size:52px 52px;will-change:transform}
.hero-content{position:relative;z-index:2;padding:0 24px}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:18px;opacity:0;animation:fadeUp .7s .2s forwards}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(4.5rem,15vw,11rem);line-height:.88;background:linear-gradient(135deg,#fff 25%,var(--gold) 75%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:fadeUp .7s .35s forwards}
.hero-sub{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,3.5vw,2rem);color:var(--gold);letter-spacing:.18em;margin-top:10px;opacity:0;animation:fadeUp .7s .5s forwards}
.hero-vs{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:32px;opacity:0;animation:fadeUp .7s .65s forwards}
.hero-player{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3.6rem);letter-spacing:.06em}
.hero-player.marce{color:var(--marce)}.hero-player.roberto{color:var(--roberto)}
.hero-vs-sep{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted)}
.hero-scroll{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeIn 1s 1.3s forwards;cursor:pointer;text-decoration:none;color:var(--muted)}
.hero-scroll span{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase}
.scroll-arrow{width:18px;height:18px;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);transform:rotate(45deg);animation:bounce 1.3s infinite}

/* STICKY */
.sticky-bar{position:sticky;top:0;z-index:100;background:rgba(7,11,20,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:10px 16px}
.sticky-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:clamp(10px,3vw,40px)}
.sb-player{display:flex;flex-direction:column;align-items:center;gap:1px}
.sb-name{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase}
.sb-name.marce{color:var(--marce)}.sb-name.roberto{color:var(--roberto)}
.sb-pts{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5.5vw,3rem);line-height:1}
.sb-pts.marce{color:var(--marce)}.sb-pts.roberto{color:var(--roberto)}
.sb-mid{display:flex;flex-direction:column;align-items:center;gap:1px}
.sb-vs{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold)}
.sb-info{font-family:'JetBrains Mono',monospace;font-size:.48rem;color:var(--muted);letter-spacing:.15em;text-align:center}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 1.2s infinite;margin-right:4px}
.live-dot.off{background:var(--muted);animation:none}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:64px 16px 80px}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:.04em;line-height:1;margin-bottom:40px}

/* LEADER */
.leader-card{background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(245,200,66,.02));border:1px solid rgba(245,200,66,.28);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:12px}
.leader-left{display:flex;flex-direction:column;gap:2px}
.leader-label{font-size:.68rem;color:var(--muted);letter-spacing:.1em}
.leader-name{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.05em}
.leader-name.marce{color:var(--marce)}.leader-name.roberto{color:var(--roberto)}.leader-name.tie{color:var(--gold)}
.leader-diff{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--gold)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:48px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1}
.stat-val.marce{color:var(--marce)}.stat-val.roberto{color:var(--roberto)}
.stat-lbl{font-size:.65rem;color:var(--muted);margin-top:3px;letter-spacing:.08em}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.2;margin:48px 0}

/* LEGEND */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px;padding:14px 16px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:7px;font-size:.7rem;color:var(--muted)}
.badge-exact{background:var(--gold);color:#000;font-family:'JetBrains Mono',monospace;font-size:.48rem;padding:2px 5px;border-radius:3px;font-weight:700;letter-spacing:.08em}
.badge-win{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.35);font-family:'JetBrains Mono',monospace;font-size:.48rem;padding:2px 5px;border-radius:3px;letter-spacing:.08em}

/* GRID */
.matches-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:600px){.matches-grid{grid-template-columns:1fr}}

/* MATCH CARD */
.match-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:15px;position:relative;overflow:hidden;opacity:0;transform:translateY(16px);transition:border-color .2s,box-shadow .2s}
.match-card.visible{opacity:1;transform:translateY(0);transition:opacity .45s ease,transform .45s ease,border-color .2s}
.match-card:hover{border-color:rgba(245,200,66,.3);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);opacity:.4}

.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mc-num{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.18em}
.mc-status{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.12em;padding:2px 7px;border-radius:10px}
.mc-status.live{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.mc-status.final{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.mc-status.soon{background:rgba(136,150,176,.1);color:var(--muted);border:1px solid rgba(136,150,176,.2)}

.mc-teams{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mc-team{display:flex;align-items:center;gap:6px;flex:1}
.mc-team.away{flex-direction:row-reverse;text-align:right}
.mc-flag{font-size:1.25rem}.mc-tname{font-weight:600;font-size:.82rem}
.mc-sep{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);flex-shrink:0}

/* RESULT */
.mc-result{display:flex;align-items:center;justify-content:center;gap:10px;border-radius:7px;padding:5px 10px;margin-bottom:10px}
.mc-result.final-r{background:rgba(245,200,66,.07)}
.mc-result.live-r{background:rgba(34,197,94,.08)}
.mc-result.pending-r{background:rgba(136,150,176,.06)}
.mc-result-lbl{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--muted);letter-spacing:.15em}
.mc-result-score{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.05em}
.mc-result.final-r .mc-result-score{color:var(--gold)}
.mc-result.live-r .mc-result-score{color:#22c55e}
.mc-result.pending-r .mc-result-score{color:var(--muted);font-size:.85rem}

/* PREDICTIONS */
.mc-preds{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:10px}
.pred{border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.pred.m{background:rgba(233,30,99,.08);border:1px solid rgba(233,30,99,.2)}
.pred.r{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2)}
.pred-who{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase}
.pred-who.m{color:var(--marce)}.pred-who.r{color:var(--roberto)}
.pred-scr{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;line-height:1.1}
.pred-info{display:flex;align-items:center;gap:4px;font-size:.55rem;color:var(--muted);margin-top:1px;flex-wrap:wrap}
.pts-num{color:var(--gold);font-weight:700}

footer{border-top:1px solid var(--border);padding:28px 16px;text-align:center;color:var(--muted);font-size:.65rem;letter-spacing:.1em}
.last-update{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.12em;margin-top:32px}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

    Cargando resultados…
  </div>

  <p>⚽ Quiniela Marce vs Roberto · FIFA World Cup 2026 · Actualización automática cada 60s</p>

<script>
// ════════════════════════════════════════════
//  FLAGS
// ════════════════════════════════════════════
const FLAGS = {
  'Germany':'🇩🇪','Paraguay':'🇵🇾','France':'🇫🇷','Sweden':'🇸🇪',
  'South Africa':'🇿🇦','Canada':'🇨🇦','Netherlands':'🇳🇱','Morocco':'🇲🇦',
  'Portugal':'🇵🇹','Croatia':'🇭🇷','Spain':'🇪🇸','United States':'🇺🇸',
  'USA':'🇺🇸','Bosnia and Herzegovina':'🇧🇦','Bosnia-Herz':'🇧🇦',
  'Belgium':'🇧🇪','Senegal':'🇸🇳','Austria':'🇦🇹','Algeria':'🇩🇿',
  'Brazil':'🇧🇷','Japan':'🇯🇵',
  'Ivory Coast':'🇨🇮','Côte d\'Ivoire':'🇨🇮','Cote d\'Ivoire':'🇨🇮',
  'Norway':'🇳🇴','Mexico':'🇲🇽','Ecuador':'🇪🇨','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿',
  'DR Congo':'🇨🇩','Congo DR':'🇨🇩','Congo':'🇨🇩',
  'Argentina':'🇦🇷','Cape Verde':'🇨🇻','Australia':'🇦🇺','Egypt':'🇪🇬',
  'Switzerland':'🇨🇭','Colombia':'🇨🇴','Ghana':'🇬🇭',
};
function flag(n){ return FLAGS[n]||'🏳️'; }

// ════════════════════════════════════════════
//  QUINIELA — predicciones verificadas vs imagen
//  pred = [golesLocal, golesVisitante]
//  pred con 'G' = fueron a penales, el (G) indica quién ganó
//    si home > away → local ganó pens
//    si away > home → visitante ganó pens  
//    si empate + 'G' → se mira penSide: 'home' o 'away'
// ════════════════════════════════════════════
const QUINIELA = [
  // P1  South Africa vs Canada
  // Marce: S.Africa 0 – Canada 2  | Roberto: S.Africa 1 – Canada 2
  { n:1, home:'South Africa', away:'Canada',
    marce:[0,2], roberto:[1,2] },

  // P2  Netherlands vs Morocco
  // Marce: NED 1(G)–1 MAR (NED gana pens) | Roberto: NED 2–1 MAR
  { n:2, home:'Netherlands', away:'Morocco',
    marce:[1,1,'G','home'], roberto:[2,1] },

  // P3  Germany vs Paraguay
  // Marce: GER 3–0 PAR | Roberto: GER 3–0 PAR
  { n:3, home:'Germany', away:'Paraguay',
    marce:[3,0], roberto:[3,0] },

  // P4  France vs Sweden
  // Marce: FRA 3–1 SWE | Roberto: FRA 3–0 SWE
  { n:4, home:'France', away:'Sweden',
    marce:[3,1], roberto:[3,0] },

  // P5  Belgium vs Senegal
  // Marce: BEL 2–1 SEN | Roberto: BEL 1–0 SEN
  { n:5, home:'Belgium', away:'Senegal',
    marce:[2,1], roberto:[1,0] },

  // P6  USA vs Bosnia and Herzegovina
  // Marce: USA 2–1 BIH | Roberto: USA 3–0 BIH
  { n:6, home:'United States', away:'Bosnia and Herzegovina',
    marce:[2,1], roberto:[3,0] },

  // P7  Spain vs Austria
  // Marce: ESP 2–0 AUT | Roberto: ESP 2–0 AUT
  { n:7, home:'Spain', away:'Austria',
    marce:[2,0], roberto:[2,0] },

  // P8  Croatia vs Portugal
  // Marce: CRO 1–1(G) POR  Portugal gana pens | Roberto: CRO 1–2 POR
  { n:8, home:'Croatia', away:'Portugal',
    marce:[1,1,'G','away'], roberto:[1,2] },

  // P9  Brazil vs Japan
  // Marce: BRA 1–1(G) JPN  Japón gana pens | Roberto: BRA 2–2(G) JPN  Japón gana pens
  { n:9, home:'Brazil', away:'Japan',
    marce:[1,1,'G','away'], roberto:[2,2,'G','away'] },

  // P10 Ivory Coast vs Norway
  // Marce: CIV 1–2 NOR | Roberto: CIV 0–2 NOR
  { n:10, home:'Ivory Coast', away:'Norway',
    marce:[1,2], roberto:[0,2] },

  // P11 Mexico vs Ecuador
  // Marce: MEX 1(G)–1 ECU  México gana pens | Roberto: MEX 2–1 ECU
  { n:11, home:'Mexico', away:'Ecuador',
    marce:[1,1,'G','home'], roberto:[2,1] },

  // P12 England vs DR Congo
  // Marce: ENG 2–0 COD | Roberto: ENG 2–1 COD
  { n:12, home:'England', away:'DR Congo',
    marce:[2,0], roberto:[2,1] },

  // P13 Switzerland vs Algeria
  // Marce: SUI 2–0 ALG | Roberto: SUI 1–0 ALG
  { n:13, home:'Switzerland', away:'Algeria',
    marce:[2,0], roberto:[1,0] },

  // P14 Ghana vs Colombia
  // Marce: GHA 1–1(G) COL  Colombia gana pens | Roberto: GHA 0–2 COL
  { n:14, home:'Ghana', away:'Colombia',
    marce:[1,1,'G','away'], roberto:[0,2] },

  // P15 Australia vs Egypt
  // Marce: AUS 1–2 EGY | Roberto: AUS 1–0 EGY
  { n:15, home:'Australia', away:'Egypt',
    marce:[1,2], roberto:[1,0] },

  // P16 Argentina vs Cape Verde
  // Marce: ARG 3–0 CPV | Roberto: ARG 3–0 CPV
  { n:16, home:'Argentina', away:'Cape Verde',
    marce:[3,0], roberto:[3,0] },
];

// ════════════════════════════════════════════
//  SCORING
// ════════════════════════════════════════════
function calcPts(pred, aH, aA, actualPenW) {
  if (!pred || aH === null || aA === null) return {pts:0, badge:null};
  const [pH, pA, pSfx, pPenW] = pred;
  const phN = parseInt(pH), paN = parseInt(pA);

  // Ganador real
  let realW = aH > aA ? 'H' : aA > aH ? 'A' : actualPenW ? (actualPenW==='home'?'H':'A') : 'D';

  // Ganador predicho
  let predW;
  if (phN > paN) predW = 'H';
  else if (paN > phN) predW = 'A';
  else if (pSfx==='G') predW = pPenW==='home' ? 'H' : pPenW==='away' ? 'A' : 'PEN';
  else predW = 'D';

  // ¿Exacto en goles (sin contar pens)?
  if (phN===aH && paN===aA) {
    if (!pSfx && !actualPenW) return {pts:3, badge:'exact'}; // limpio
    if (pSfx==='G' && actualPenW) return {pts:3, badge:'exact'}; // predijo pens, hubo pens
    if (!pSfx && actualPenW) return {pts:0, badge:null}; // no predijo pens, hubo pens → 0
    if (pSfx==='G' && !actualPenW) return {pts:0, badge:null}; // predijo pens, no hubo → 0
  }

  // ¿Ganador correcto?
  if (realW!=='D' && realW===predW) return {pts:1, badge:'win'};
  if (predW==='PEN' && realW!=='D') return {pts:1, badge:'win'}; // predijo pens sin lado
  return {pts:0, badge:null};
}

function fmtPred(pred) {
  if (!pred) return '?';
  const [h, a, sfx, penW] = pred;
  if (sfx==='G') {
    if (penW==='home') return `${h}(G) – ${a}`;
    if (penW==='away') return `${h} – ${a}(G)`;
    return `${h}(G) – ${a}`;
  }
  return `${h} – ${a}`;
}

// ════════════════════════════════════════════
//  ESPN API — rango completo del torneo
//  + fallback hardcodeado por si la API falla
// ════════════════════════════════════════════
// Resultados ya conocidos (fallback garantizado)
const HARDCODED = [
  // South Africa 0 – Canada 1 (jun 28)
  { homeName:'South Africa', awayName:'Canada', homeScore:0, awayScore:1, completed:true, live:false, penWinner:null, date:'2026-06-28' },
];

let teamIdx = {};   // norm(teamName) → entry
let lastFetch = null;
let fetchTimer = null;
let hasLive = false;

// Normalización tolerante
function norm(s) {
  return (s||'').toLowerCase().trim()
    .replace(/\bUnited States\b/gi,'usa').replace(/\bu\.s\.a?\b/gi,'usa')
    .replace(/côte d.ivoire/gi,'ivory coast').replace(/cote d.ivoire/gi,'ivory coast')
    .replace(/dr\.?\s*congo/gi,'dr congo').replace(/congo,?\s*dr\.?/gi,'dr congo')
    .replace(/democratic republic.*congo/gi,'dr congo')
    .replace(/bosnia[ -]herz\.?/gi,'bosnia and herzegovina')
    .replace(/bosnia\s*&\s*herzegovina/gi,'bosnia and herzegovina')
    .replace(/\s+/g,' ');
}

function addToIdx(entry) {
  const hn = norm(entry.homeName);
  const an = norm(entry.awayName);
  if (hn) teamIdx[hn] = entry;
  if (an) teamIdx[an] = {
    ...entry,
    homeName: entry.awayName, awayName: entry.homeName,
    homeScore: entry.awayScore, awayScore: entry.homeScore,
    penWinner: entry.penWinner==='home'?'away': entry.penWinner==='away'?'home':null,
  };
}

async function fetchScores() {
  // Base: hardcoded
  teamIdx = {};
  HARDCODED.forEach(addToIdx);

  try {
    // Pedimos TODO el rango del torneo knockout de una vez
    const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=20260628-20260719';
    const r = await fetch(url);
    if (!r.ok) throw new Error('ESPN '+r.status);
    const data = await r.json();
    hasLive = false;

    (data.events||[]).forEach(ev => {
      const comp = ev.competitions?.[0]; if(!comp) return;
      const teams = comp.competitors||[];
      const home = teams.find(t=>t.homeAway==='home')||teams[0];
      const away = teams.find(t=>t.homeAway==='away')||teams[1];
      if(!home||!away) return;

      const hn = home.team?.displayName||home.team?.shortDisplayName||'';
      const an = away.team?.displayName||away.team?.shortDisplayName||'';
      const statusName = comp.status?.type?.name||'';
      const completed  = comp.status?.type?.completed||false;
      const isLive     = statusName==='STATUS_IN_PROGRESS';
      if(isLive) hasLive=true;

      const hS = (completed||isLive) ? parseInt(home.score??0) : null;
      const aS = (completed||isLive) ? parseInt(away.score??0) : null;

      // Detectar penales: marcador empatado + tiene ganador declarado
      let penWinner = null;
      if(completed && hS===aS) {
        if(home.winner===true) penWinner='home';
        if(away.winner===true) penWinner='away';
      }

      addToIdx({
        homeName:hn, awayName:an,
        homeScore:hS, awayScore:aS,
        completed, live:isLive,
        penWinner,
        clock: comp.status?.displayClock||'',
        date: comp.date||'',
      });
    });

    lastFetch = new Date();
    return true;
  } catch(e) {
    console.warn('ESPN error:', e.message, '— usando fallback');
    lastFetch = new Date();
    return false;
  }
}

function findMatch(homeTarget, awayTarget) {
  const hn = norm(homeTarget);
  const an = awayTarget ? norm(awayTarget) : null;

  // Exacto
  if (teamIdx[hn]) {
    const e = teamIdx[hn];
    if (!an) return e;
    const ea = norm(e.awayName);
    if (ea===an || ea.startsWith(an.slice(0,5)) || an.startsWith(ea.slice(0,5))) return e;
  }
  // Parcial
  for (const key of Object.keys(teamIdx)) {
    if (hn.startsWith(key.slice(0,5)) || key.startsWith(hn.slice(0,5))) {
      const e = teamIdx[key];
      if (!an) return e;
      const ea = norm(e.awayName);
      if (ea.startsWith(an.slice(0,5)) || an.startsWith(ea.slice(0,5))) return e;
    }
  }
  return null;
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function badgeHtml(b) {
  if(b==='exact') return `<span class="badge-exact">EXACTO</span>`;
  if(b==='win')   return `<span class="badge-win">GANADOR</span>`;
  return '';
}

function renderCard(q, i) {
  const match = findMatch(q.home, q.away);
  const hasResult = match && match.homeScore !== null;
  const isLive    = match?.live || false;

  const aH = hasResult ? match.homeScore : null;
  const aA = hasResult ? match.awayScore : null;
  const penW = match?.penWinner || null;

  const mS = calcPts(q.marce,   aH, aA, penW);
  const rS = calcPts(q.roberto, aH, aA, penW);

  // Status badge
  let statusHtml;
  if (isLive) {
    statusHtml = `<span class="mc-status live">🔴 ${match.clock||'EN VIVO'}</span>`;
  } else if (hasResult) {
    statusHtml = `<span class="mc-status final">FINAL</span>`;
  } else {
    const d = match?.date ? new Date(match.date).toLocaleDateString('es',{day:'numeric',month:'short'}) : 'Por jugar';
    statusHtml = `<span class="mc-status soon">${d}</span>`;
  }

  // Result row
  let resultHtml;
  if (isLive) {
    resultHtml = `<div class="mc-result live-r"><span class="mc-result-lbl">EN VIVO</span><span class="mc-result-score">${aH} – ${aA}</span></div>`;
  } else if (hasResult) {
    const penLbl = penW ? `<small style="font-size:.5rem;color:var(--muted);font-family:'JetBrains Mono',monospace"> PENS</small>` : '';
    resultHtml = `<div class="mc-result final-r"><span class="mc-result-lbl">RESULTADO</span><span class="mc-result-score">${aH} – ${aA}${penLbl}</span></div>`;
  } else {
    resultHtml = `<div class="mc-result pending-r"><span class="mc-result-lbl">RESULTADO</span><span class="mc-result-score">– – –</span></div>`;
  }

  const hFlag = flag(match?.homeName||q.home);
  const aFlag = flag(match?.awayName||q.away);
  const hName = match?.homeName||q.home;
  const aName = match?.awayName||q.away;

  const mPts = hasResult ? `<span class="pts-num">${mS.pts>0?'+'+mS.pts+' pts':'0 pts'}</span>` : `<span style="color:var(--muted)">–</span>`;
  const rPts = hasResult ? `<span class="pts-num">${rS.pts>0?'+'+rS.pts+' pts':'0 pts'}</span>` : `<span style="color:var(--muted)">–</span>`;

  return `
<div class="match-card" id="card-${i}">
  <div class="mc-top">
    <span class="mc-num">PARTIDO ${q.n}</span>
    ${statusHtml}
  </div>
  ${resultHtml}
  <div class="mc-teams">
    <div class="mc-team home"><span class="mc-flag">${hFlag}</span><span class="mc-tname">${hName}</span></div>
    <span class="mc-sep">vs</span>
    <div class="mc-team away"><span class="mc-flag">${aFlag}</span><span class="mc-tname">${aName}</span></div>
  </div>
  <div class="mc-preds">
    <div class="pred m">
      <span class="pred-who m">Marce</span>
      <span class="pred-scr">${fmtPred(q.marce)}</span>
      <div class="pred-info">${badgeHtml(mS.badge)} ${mPts}</div>
    </div>
    <div class="pred r">
      <span class="pred-who r">Roberto</span>
      <span class="pred-scr">${fmtPred(q.roberto)}</span>
      <div class="pred-info">${badgeHtml(rS.badge)} ${rPts}</div>
    </div>
  </div>
</div>`;
}

function calcTotals() {
  let mT=0,rT=0,mE=0,rE=0,mW=0,rW=0;
  QUINIELA.forEach(q => {
    const match = findMatch(q.home, q.away);
    const hasResult = match && match.homeScore!==null;
    const aH = hasResult ? match.homeScore : null;
    const aA = hasResult ? match.awayScore : null;
    const penW = match?.penWinner||null;
    const ms = calcPts(q.marce,   aH, aA, penW);
    const rs = calcPts(q.roberto, aH, aA, penW);
    mT+=ms.pts; rT+=rs.pts;
    if(ms.badge==='exact') mE++; if(rs.badge==='exact') rE++;
    if(ms.badge==='win')   mW++; if(rs.badge==='win')   rW++;
  });
  return {mT,rT,mE,rE,mW,rW};
}

function renderAll() {
  const t = calcTotals();

  // Sticky
  document.getElementById('pts-marce').textContent   = t.mT;
  document.getElementById('pts-roberto').textContent = t.rT;
  const dot = document.getElementById('live-dot');
  const st  = document.getElementById('api-status');
  if (hasLive) { dot.className='live-dot'; st.textContent='🔴 EN VIVO'; }
  else { dot.className='live-dot off'; st.textContent = lastFetch ? 'ESPN · '+lastFetch.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : 'Cargando…'; }

  // Leader
  let lName, lClass, lDiff;
  if (t.mT>t.rT) { lName='Marce'; lClass='marce'; lDiff=`↑ ${t.mT-t.rT} pts de ventaja`; }
  else if (t.rT>t.mT) { lName='Roberto'; lClass='roberto'; lDiff=`↑ ${t.rT-t.mT} pts de ventaja`; }
  else { lName='¡Empate!'; lClass='tie'; lDiff='Mano a mano 🔥'; }

  document.getElementById('main').innerHTML = `
    <div class="leader-card">
      <div class="leader-left"><span class="leader-label">Líder actual</span><span class="leader-name ${lClass}">${lName}</span></div>
      <span class="leader-diff">${lDiff}</span>
    </div>
    <div class="sec-label">Dieciseisavos de Final</div>
    <h2 class="sec-title">Tabla de Posiciones</h2>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val marce">${t.mT}</div><div class="stat-lbl">Puntos Marce</div></div>
      <div class="stat-card"><div class="stat-val roberto">${t.rT}</div><div class="stat-lbl">Puntos Roberto</div></div>
      <div class="stat-card"><div class="stat-val marce">${t.mE}</div><div class="stat-lbl">Exactos Marce</div></div>
      <div class="stat-card"><div class="stat-val roberto">${t.rE}</div><div class="stat-lbl">Exactos Roberto</div></div>
      <div class="stat-card"><div class="stat-val marce">${t.mW}</div><div class="stat-lbl">Ganadores Marce</div></div>
      <div class="stat-card"><div class="stat-val roberto">${t.rW}</div><div class="stat-lbl">Ganadores Roberto</div></div>
    </div>
    <div class="divider"></div>
    <div class="sec-label" style="margin-top:40px">Dieciseisavos · Todos los partidos</div>
    <h2 class="sec-title">La Llave</h2>
    <div class="legend">
      <div class="leg-item"><span class="badge-exact">EXACTO</span> Marcador exacto = 3 pts</div>
      <div class="leg-item"><span class="badge-win">GANADOR</span> Solo ganador = 1 pt</div>
      <div class="leg-item">🔴 En vivo</div>
      <div class="leg-item">⏳ Por jugarse</div>
    </div>
    <div class="matches-grid">${QUINIELA.map((q,i)=>renderCard(q,i)).join('')}</div>
    <div class="last-update">${lastFetch?`Última actualización: ${lastFetch.toLocaleTimeString('es')} · Refresca cada 60s`:''}</div>
  `;

  requestAnimationFrame(()=>{
    const cards = document.querySelectorAll('.match-card');
    const obs = new IntersectionObserver(entries=>{
      entries.forEach((e,i)=>{ if(e.isIntersecting){setTimeout(()=>e.target.classList.add('visible'),i*50);obs.unobserve(e.target);} });
    },{threshold:.05});
    cards.forEach(c=>obs.observe(c));
  });
}

// ════════════════════════════════════════════
//  PARALLAX
// ════════════════════════════════════════════
window.addEventListener('scroll',()=>{
  const y=window.scrollY;
  const bg=document.getElementById('bgLayer');
  const gr=document.getElementById('gridLayer');
  if(bg) bg.style.transform=`translateY(${y*.33}px)`;
  if(gr) gr.style.transform=`translateY(${y*.18}px)`;
},{passive:true});

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
async function init() {
  await fetchScores();
  renderAll();
  clearInterval(fetchTimer);
  fetchTimer = setInterval(async ()=>{
    await fetchScores();
    renderAll();
  }, hasLive ? 30000 : 60000);
}

init();
</script>
</body>
</html>
