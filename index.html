<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 · Marce vs Roberto</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
:root{--gold:#F5C842;--marce:#E91E63;--roberto:#2563EB;--bg:#070B14;--s2:#161E30;--border:rgba(245,200,66,.15);--text:#F0F4FF;--muted:#8896B0}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.hero{position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hbg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(26,58,110,.8) 0%,transparent 70%),radial-gradient(ellipse 50% 35% at 50% -5%,rgba(245,200,66,.12) 0%,transparent 60%),linear-gradient(180deg,#020408,#070B14 50%,#0D1528);will-change:transform}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(245,200,66,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(245,200,66,.04) 1px,transparent 1px);background-size:52px 52px;will-change:transform}
.hc{position:relative;z-index:2;padding:0 24px}
.hey{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:18px;opacity:0;animation:fU .7s .2s forwards}
.ht{font-family:'Bebas Neue',sans-serif;font-size:clamp(4.5rem,15vw,11rem);line-height:.88;background:linear-gradient(135deg,#fff 25%,var(--gold) 75%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:fU .7s .35s forwards}
.hs{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,3.5vw,2rem);color:var(--gold);letter-spacing:.18em;margin-top:10px;opacity:0;animation:fU .7s .5s forwards}
.hvs{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:32px;opacity:0;animation:fU .7s .65s forwards}
.hp{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3.6rem);letter-spacing:.06em}
.hp.m{color:var(--marce)}.hp.r{color:var(--roberto)}
.hvsep{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted)}
.hscr{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fI 1s 1.3s forwards;cursor:pointer;text-decoration:none;color:var(--muted)}
.hscr span{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase}
.sarr{width:18px;height:18px;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);transform:rotate(45deg);animation:bnc 1.3s infinite}
.sbar{position:sticky;top:0;z-index:100;background:rgba(7,11,20,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:10px 16px}
.si{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:clamp(10px,3vw,40px)}
.sp{display:flex;flex-direction:column;align-items:center;gap:1px}
.sn{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase}
.sn.m{color:var(--marce)}.sn.r{color:var(--roberto)}
.spts{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5.5vw,3rem);line-height:1}
.spts.m{color:var(--marce)}.spts.r{color:var(--roberto)}
.smid{display:flex;flex-direction:column;align-items:center;gap:1px}
.svs{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold)}
.sinf{font-family:'JetBrains Mono',monospace;font-size:.48rem;color:var(--muted);letter-spacing:.15em;text-align:center}
.ld{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pls 1.2s infinite;margin-right:4px;vertical-align:middle}
.ld.off{background:var(--muted);animation:none}
.main{max-width:1100px;margin:0 auto;padding:64px 16px 80px}
.sl{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.stit{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:.04em;line-height:1;margin-bottom:40px}
.lcard{background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(245,200,66,.02));border:1px solid rgba(245,200,66,.28);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:12px}
.ll{display:flex;flex-direction:column;gap:2px}
.llbl{font-size:.68rem;color:var(--muted);letter-spacing:.1em}
.lname{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.05em}
.lname.m{color:var(--marce)}.lname.r{color:var(--roberto)}.lname.t{color:var(--gold)}
.ldiff{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--gold)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:48px}
.sc{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center}
.sv{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1}
.sv.m{color:var(--marce)}.sv.r{color:var(--roberto)}
.slbl{font-size:.65rem;color:var(--muted);margin-top:3px;letter-spacing:.08em}
.div{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.2;margin:48px 0}
.leg{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px;padding:14px 16px;background:var(--s2);border-radius:10px;border:1px solid var(--border)}
.li{display:flex;align-items:center;gap:7px;font-size:.7rem;color:var(--muted)}
.bex{background:var(--gold);color:#000;font-family:'JetBrains Mono',monospace;font-size:.48rem;padding:2px 5px;border-radius:3px;font-weight:700;letter-spacing:.08em}
.bwi{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.35);font-family:'JetBrains Mono',monospace;font-size:.48rem;padding:2px 5px;border-radius:3px;letter-spacing:.08em}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:600px){.mg{grid-template-columns:1fr}}
.mc{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:15px;position:relative;overflow:hidden;opacity:0;transform:translateY(16px);transition:border-color .2s,box-shadow .2s}
.mc.vis{opacity:1;transform:translateY(0);transition:opacity .45s ease,transform .45s ease,border-color .2s}
.mc:hover{border-color:rgba(245,200,66,.3);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);opacity:.4}
.mct{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mcn{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.18em}
.mcs{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.12em;padding:2px 7px;border-radius:10px}
.mcs.fin{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.mcs.soon{background:rgba(136,150,176,.1);color:var(--muted);border:1px solid rgba(136,150,176,.2)}
.res{display:flex;align-items:center;justify-content:center;gap:10px;border-radius:7px;padding:5px 10px;margin-bottom:10px}
.res.fr{background:rgba(245,200,66,.07)}.res.pr{background:rgba(136,150,176,.06)}
.rl{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--muted);letter-spacing:.15em}
.rs{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.05em}
.res.fr .rs{color:var(--gold)}.res.pr .rs{color:var(--muted);font-size:.85rem}
.mctm{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.tm{display:flex;align-items:center;gap:6px;flex:1}
.tm.aw{flex-direction:row-reverse;text-align:right}
.fl{font-size:1.25rem}.tn{font-weight:600;font-size:.82rem}
.sep{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);flex-shrink:0}
.preds{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:10px}
.pr2{border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.pr2.pm{background:rgba(233,30,99,.08);border:1px solid rgba(233,30,99,.2)}
.pr2.prr{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2)}
.pw{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase}
.pw.m{color:var(--marce)}.pw.r{color:var(--roberto)}
.psc{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;line-height:1.1}
.pi{display:flex;align-items:center;gap:4px;font-size:.55rem;color:var(--muted);margin-top:1px;flex-wrap:wrap}
.pn{color:var(--gold);font-weight:700}
footer{border-top:1px solid var(--border);padding:28px 16px;text-align:center;color:var(--muted);font-size:.65rem;letter-spacing:.1em}
.lu{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.12em;margin-top:32px}
@keyframes fU{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes bnc{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(5px)}}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<section class="hero">
  <div class="hbg" id="hbg"></div>
  <div class="hgrid" id="hgrid"></div>
  <div class="hc">
    <p class="hey">⚽ FIFA World Cup 2026 · Quiniela Personal</p>
    <h1 class="ht">MUNDIAL<br>2026</h1>
    <p class="hs">Road to the Final · New York New Jersey</p>
    <div class="hvs">
      <span class="hp m">Marce</span>
      <span class="hvsep">— VS —</span>
      <span class="hp r">Roberto</span>
    </div>
  </div>
  <a class="hscr" href="#sb"><span>Ver marcador</span><div class="sarr"></div></a>
</section>

<div class="sbar" id="sb">
  <div class="si">
    <div class="sp"><span class="sn m">Marce</span><span class="spts m" id="pm">–</span></div>
    <div class="smid">
      <span class="svs">VS</span>
      <span class="sinf"><span class="ld off" id="ldot"></span><span id="ast">Cargando…</span></span>
    </div>
    <div class="sp"><span class="sn r">Roberto</span><span class="spts r" id="pr">–</span></div>
  </div>
</div>

<main class="main" id="main">
  <div style="text-align:center;padding:60px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.75rem">
    <div style="width:18px;height:18px;border:2px solid rgba(245,200,66,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px"></div>
    Cargando resultados…
  </div>
</main>
<footer><p>⚽ Quiniela Marce vs Roberto · FIFA World Cup 2026 · Datos: openfootball/worldcup.json · Actualización automática</p></footer>

<script>
// ── FLAGS ─────────────────────────────────────────
const FL={
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czech Republic':'🇨🇿',
  'Canada':'🇨🇦','Bosnia & Herzegovina':'🇧🇦','Bosnia and Herzegovina':'🇧🇦',
  'Qatar':'🇶🇦','Switzerland':'🇨🇭','Brazil':'🇧🇷','Morocco':'🇲🇦',
  'Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','USA':'🇺🇸','Paraguay':'🇵🇾',
  'Australia':'🇦🇺','Turkey':'🇹🇷','Germany':'🇩🇪','Curaçao':'🇨🇼',
  'Ivory Coast':'🇨🇮','Ecuador':'🇪🇨','Netherlands':'🇳🇱','Japan':'🇯🇵',
  'Sweden':'🇸🇪','Tunisia':'🇹🇳','Belgium':'🇧🇪','Egypt':'🇪🇬',
  'Iran':'🇮🇷','New Zealand':'🇳🇿','Spain':'🇪🇸','Cape Verde':'🇨🇻',
  'Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾','France':'🇫🇷','Senegal':'🇸🇳',
  'Iraq':'🇮🇶','Norway':'🇳🇴','Argentina':'🇦🇷','Algeria':'🇩🇿',
  'Austria':'🇦🇹','Jordan':'🇯🇴','Portugal':'🇵🇹','DR Congo':'🇨🇩',
  'Uzbekistan':'🇺🇿','Colombia':'🇨🇴','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷',
  'Ghana':'🇬🇭','Panama':'🇵🇦',
};
const flag=n=>FL[n]||'🏳️';

// ── QUINIELA ─────────────────────────────────────
// pred=[home,away] o [home,away,'G','home'|'away']
// La clave "t1" y "t2" deben coincidir con los nombres del JSON de openfootball
const Q=[
  {n:1,  t1:'South Africa', t2:'Canada',               m:[0,2],            r:[1,2]},
  {n:2,  t1:'Netherlands',  t2:'Morocco',               m:[1,1,'G','home'], r:[2,1]},
  {n:3,  t1:'Germany',      t2:'Paraguay',              m:[3,0],            r:[3,0]},
  {n:4,  t1:'France',       t2:'Sweden',                m:[3,1],            r:[3,0]},
  {n:5,  t1:'Belgium',      t2:'Senegal',               m:[2,1],            r:[1,0]},
  {n:6,  t1:'USA',          t2:'Bosnia & Herzegovina',  m:[2,1],            r:[3,0]},
  {n:7,  t1:'Spain',        t2:'Austria',               m:[2,0],            r:[2,0]},
  {n:8,  t1:'Croatia',      t2:'Portugal',              m:[1,1,'G','away'], r:[1,2]},
  {n:9,  t1:'Brazil',       t2:'Japan',                 m:[1,1,'G','away'], r:[2,2,'G','away']},
  {n:10, t1:'Ivory Coast',  t2:'Norway',                m:[1,2],            r:[0,2]},
  {n:11, t1:'Mexico',       t2:'Ecuador',               m:[1,1,'G','home'], r:[2,1]},
  {n:12, t1:'England',      t2:'DR Congo',              m:[2,0],            r:[2,1]},
  {n:13, t1:'Switzerland',  t2:'Algeria',               m:[2,0],            r:[1,0]},
  {n:14, t1:'Ghana',        t2:'Colombia',              m:[1,1,'G','away'], r:[0,2]},
  {n:15, t1:'Australia',    t2:'Egypt',                 m:[1,2],            r:[1,0]},
  {n:16, t1:'Argentina',    t2:'Cape Verde',            m:[3,0],            r:[3,0]},
];

// ── SCORING ──────────────────────────────────────
function pts(pred,aH,aA,penW){
  if(!pred||aH===null||aA===null)return{p:0,b:null};
  const[pH,pA,sfx,pPW]=pred;
  const phN=+pH,paN=+pA;
  const rW=aH>aA?'H':aA>aH?'A':penW?(penW==='home'?'H':'A'):'D';
  let dW=phN>paN?'H':paN>phN?'A':sfx==='G'?(pPW==='home'?'H':pPW==='away'?'A':'P'):'D';
  if(phN===aH&&paN===aA){
    if(!sfx&&!penW)return{p:3,b:'e'};
    if(sfx==='G'&&penW)return{p:3,b:'e'};
    return{p:0,b:null};
  }
  if(rW!=='D'&&(rW===dW||(dW==='P'&&rW!=='D')))return{p:1,b:'w'};
  return{p:0,b:null};
}

function fmt(pred){
  if(!pred)return'?';
  const[h,a,s,w]=pred;
  if(s==='G'){
    if(w==='home')return`${h}(G) – ${a}`;
    if(w==='away')return`${h} – ${a}(G)`;
    return`${h}(G) – ${a}`;
  }
  return`${h} – ${a}`;
}

// ── API openfootball/worldcup.json ───────────────
// Gratis, sin key, CORS abierto, actualizado diariamente con resultados reales
const API_URL='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

let RESULTS={};  // norm(t1+'|'+t2) → {hS,aS,done,pen}
let lFetch=null, tmr=null;

// Normaliza nombre de equipo para match
function N(s){
  return(s||'').toLowerCase().trim()
    .replace(/&/g,'and')
    .replace(/\s+/g,' ');
}
function key(a,b){return N(a)+'|'+N(b);}

async function fetchData(){
  try{
    const r=await fetch(API_URL+'?t='+Date.now()); // cache-bust
    if(!r.ok)throw new Error(r.status);
    const data=await r.json();
    RESULTS={};

    (data.matches||[]).forEach(m=>{
      if(!m.score)return; // sin resultado aún
      const hS=m.score.ft?.[0]??null;
      const aS=m.score.ft?.[1]??null;
      if(hS===null||aS===null)return;

      // Penales: openfootball marca "p" en el score cuando hay penales
      // p=[penH, penA]
      let penW=null;
      if(m.score.p){
        const[pH,pA]=m.score.p;
        penW=pH>pA?'home':'away';
      }

      RESULTS[key(m.team1,m.team2)]={hS,aS,done:true,penW,t1:m.team1,t2:m.team2};
      RESULTS[key(m.team2,m.team1)]={hS:aS,aS:hS,done:true,penW:penW==='home'?'away':penW==='away'?'home':null,t1:m.team2,t2:m.team1};
    });

    lFetch=new Date();
    return true;
  }catch(e){
    console.warn('openfootball fetch error:',e.message);
    lFetch=new Date();
    return false;
  }
}

function findResult(q){
  // Intentar match exacto primero
  const k=key(q.t1,q.t2);
  if(RESULTS[k])return RESULTS[k];
  // Fallback: buscar parcial (primera palabra del nombre)
  const h=N(q.t1).split(' ')[0];
  const a=N(q.t2).split(' ')[0];
  for(const rk of Object.keys(RESULTS)){
    const[rh,ra]=rk.split('|');
    if(rh.startsWith(h)&&ra.startsWith(a))return RESULTS[rk];
  }
  return null;
}

// ── RENDER ───────────────────────────────────────
const bh=b=>b==='e'?'<span class="bex">EXACTO</span>':b==='w'?'<span class="bwi">GANADOR</span>':'';

function card(q,i){
  const res=findResult(q);
  const hasR=res&&res.hS!==null;
  const aH=hasR?res.hS:null, aA=hasR?res.aS:null, penW=res?.penW||null;
  const ms=pts(q.m,aH,aA,penW), rs=pts(q.r,aH,aA,penW);

  const stHtml=hasR?
    `<span class="mcs fin">FINAL${penW?' · PENS':''}</span>`:
    `<span class="mcs soon">Por jugar</span>`;

  const resHtml=hasR?
    `<div class="res fr"><span class="rl">RESULTADO</span><span class="rs">${aH} – ${aA}</span></div>`:
    `<div class="res pr"><span class="rl">RESULTADO</span><span class="rs">– – –</span></div>`;

  const hN=res?.t1||q.t1, aN=res?.t2||q.t2;
  const mP=hasR?`<span class="pn">${ms.p>0?'+'+ms.p+' pts':'0 pts'}</span>`:`<span style="color:var(--muted)">–</span>`;
  const rP=hasR?`<span class="pn">${rs.p>0?'+'+rs.p+' pts':'0 pts'}</span>`:`<span style="color:var(--muted)">–</span>`;

  return`<div class="mc" id="c${i}">
  <div class="mct"><span class="mcn">PARTIDO ${q.n}</span>${stHtml}</div>
  ${resHtml}
  <div class="mctm">
    <div class="tm"><span class="fl">${flag(hN)}</span><span class="tn">${hN}</span></div>
    <span class="sep">vs</span>
    <div class="tm aw"><span class="fl">${flag(aN)}</span><span class="tn">${aN}</span></div>
  </div>
  <div class="preds">
    <div class="pr2 pm"><span class="pw m">Marce</span><span class="psc">${fmt(q.m)}</span><div class="pi">${bh(ms.b)} ${mP}</div></div>
    <div class="pr2 prr"><span class="pw r">Roberto</span><span class="psc">${fmt(q.r)}</span><div class="pi">${bh(rs.b)} ${rP}</div></div>
  </div>
</div>`;
}

function totals(){
  let mT=0,rT=0,mE=0,rE=0,mW=0,rW=0;
  Q.forEach(q=>{
    const res=findResult(q);
    const hasR=res&&res.hS!==null;
    const ms=pts(q.m,hasR?res.hS:null,hasR?res.aS:null,res?.penW||null);
    const rs=pts(q.r,hasR?res.hS:null,hasR?res.aS:null,res?.penW||null);
    mT+=ms.p;rT+=rs.p;
    if(ms.b==='e')mE++;if(rs.b==='e')rE++;
    if(ms.b==='w')mW++;if(rs.b==='w')rW++;
  });
  return{mT,rT,mE,rE,mW,rW};
}

function renderAll(){
  const t=totals();
  document.getElementById('pm').textContent=t.mT;
  document.getElementById('pr').textContent=t.rT;
  document.getElementById('ldot').className='ld off';
  document.getElementById('ast').textContent=lFetch
    ?'openfootball · '+lFetch.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})
    :'Cargando…';

  let lN,lC,lD;
  if(t.mT>t.rT){lN='Marce';lC='m';lD=`↑ ${t.mT-t.rT} pts de ventaja`;}
  else if(t.rT>t.mT){lN='Roberto';lC='r';lD=`↑ ${t.rT-t.mT} pts de ventaja`;}
  else{lN='¡Empate!';lC='t';lD='Mano a mano 🔥';}

  document.getElementById('main').innerHTML=`
  <div class="lcard">
    <div class="ll"><span class="llbl">Líder actual</span><span class="lname ${lC}">${lN}</span></div>
    <span class="ldiff">${lD}</span>
  </div>
  <div class="sl">Dieciseisavos de Final</div>
  <h2 class="stit">Tabla de Posiciones</h2>
  <div class="sgrid">
    <div class="sc"><div class="sv m">${t.mT}</div><div class="slbl">Puntos Marce</div></div>
    <div class="sc"><div class="sv r">${t.rT}</div><div class="slbl">Puntos Roberto</div></div>
    <div class="sc"><div class="sv m">${t.mE}</div><div class="slbl">Exactos Marce</div></div>
    <div class="sc"><div class="sv r">${t.rE}</div><div class="slbl">Exactos Roberto</div></div>
    <div class="sc"><div class="sv m">${t.mW}</div><div class="slbl">Ganadores Marce</div></div>
    <div class="sc"><div class="sv r">${t.rW}</div><div class="slbl">Ganadores Roberto</div></div>
  </div>
  <div class="div"></div>
  <div class="sl" style="margin-top:40px">Dieciseisavos · Todos los Partidos</div>
  <h2 class="stit">La Llave</h2>
  <div class="leg">
    <div class="li"><span class="bex">EXACTO</span> Marcador exacto = 3 pts</div>
    <div class="li"><span class="bwi">GANADOR</span> Solo ganador = 1 pt</div>
    <div class="li">PENS = fue a penales</div>
  </div>
  <div class="mg">${Q.map((q,i)=>card(q,i)).join('')}</div>
  <div class="lu">Fuente: openfootball/worldcup.json · ${lFetch?'Actualizado: '+lFetch.toLocaleTimeString('es'):'–'} · refresca cada 5 min</div>`;

  requestAnimationFrame(()=>{
    const obs=new IntersectionObserver(es=>{
      es.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('vis'),i*50);obs.unobserve(e.target);}});
    },{threshold:.05});
    document.querySelectorAll('.mc').forEach(c=>obs.observe(c));
  });
}

window.addEventListener('scroll',()=>{
  const y=window.scrollY;
  document.getElementById('hbg').style.transform=`translateY(${y*.33}px)`;
  document.getElementById('hgrid').style.transform=`translateY(${y*.18}px)`;
},{passive:true});

async function init(){
  await fetchData();
  renderAll();
  clearInterval(tmr);
  // openfootball actualiza ~1x/día, pero pedimos cada 5 min para no abusar
  tmr=setInterval(async()=>{await fetchData();renderAll();},5*60*1000);
}
init();
</script>
</body>
</html>
